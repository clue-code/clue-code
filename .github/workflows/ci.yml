name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Go ${{ matrix.go-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.25']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.4.0

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify dependencies
        run: go mod download

      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Build (tui tag)
        run: go build -tags=tui -v ./...

      - name: Binary size check (C6)
        run: |
          go build -o clue-code-notag ./cmd/clue-code
          go build -tags=tui -o clue-code-tui ./cmd/clue-code
          size_notag=$(du -b clue-code-notag 2>/dev/null || stat -f%z clue-code-notag)
          size_tui=$(du -b clue-code-tui 2>/dev/null || stat -f%z clue-code-tui)
          echo "no-tag binary: ${size_notag} bytes"
          echo "tui binary:    ${size_tui} bytes"
          # Thresholds: no-tag <14MB (tui build-tag files excluded), tui <18MB
          [ "$size_notag" -le 14680064 ] || { echo "FAIL: no-tag binary ${size_notag} > 14MB"; exit 1; }
          [ "$size_tui" -le 18874368 ] || { echo "FAIL: tui binary ${size_tui} > 18MB"; exit 1; }
          # Validate tui binary is not dramatically larger than no-tag (delta guard).
          delta=$((size_tui - size_notag))
          echo "tui delta:     ${delta} bytes"
          [ "$delta" -le 6291456 ] || { echo "FAIL: tui delta ${delta} > 6MB — TUI added too much"; exit 1; }
          rm -f clue-code-notag clue-code-tui

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Test (tui tag)
        run: go test -race -tags=tui -timeout=120s ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.4.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          cache: true

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-compliant:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest
          args: --timeout=5m
